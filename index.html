<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кувандык — доска объявлений</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAF6EF;
    --bg-soft: #F3ECDF;
    --card: #FFFFFF;
    --ink: #2C2721;
    --ink-soft: #746A5C;
    --line: #EAE1D0;
    --accent: #5D6EA6;
    --accent-deep: #46527A;
    --sage: #7E9473;
    --danger: #B5563E;
    --radius: 18px;
    --shadow: 0 1px 2px rgba(44,39,33,0.04), 0 8px 24px -12px rgba(44,39,33,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    min-height:100vh;
  }
  .bg-horizon{
    position:fixed; top:0; left:0; right:0; height:340px;
    background: radial-gradient(120% 100% at 50% -20%, #FFF9EE 0%, var(--bg) 70%);
    pointer-events:none; z-index:0;
  }
  header{
    position:relative; z-index:1;
    text-align:center;
    padding: 56px 20px 28px;
  }
  header .eyebrow{
    font-size:12px; letter-spacing:.16em; text-transform:uppercase;
    color: var(--accent-deep); font-weight:700; margin-bottom:10px;
  }
  header h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: clamp(40px, 7vw, 64px);
    margin:0;
    letter-spacing:-0.01em;
    color: var(--ink);
  }
  header p{
    margin:10px 0 0;
    color: var(--ink-soft);
    font-size:15px;
  }
  .actions{
    display:flex; justify-content:center; gap:10px; margin-top:26px; flex-wrap:wrap;
  }
  button{
    font-family:'Manrope', sans-serif; cursor:pointer; border:none;
  }
  .btn-primary{
    background: var(--accent);
    color:#fff; font-weight:700; font-size:14px;
    padding:13px 24px; border-radius:999px;
    box-shadow: 0 6px 18px -6px rgba(93,110,166,0.45);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 10px 22px -6px rgba(93,110,166,0.5);}
  .btn-ghost{
    background: transparent; color: var(--ink-soft); font-weight:600; font-size:13px;
    padding:13px 16px; border-radius:999px; border:1px solid var(--line);
  }
  .btn-ghost:hover{ background: var(--bg-soft); }
  .admin-pill{
    display:inline-block; margin-top:14px; font-size:11px; font-weight:700;
    color: var(--sage); background:#EEF3EA; border:1px solid #D8E4D1;
    padding:5px 12px; border-radius:999px; letter-spacing:.03em;
    cursor:pointer;
  }

  main{
    position:relative; z-index:1;
    max-width: 1180px; margin: 0 auto; padding: 10px 20px 100px;
  }
  .feed{
    column-count: 3;
    column-gap: 22px;
  }
  @media (max-width: 900px){ .feed{ column-count: 2; } }
  @media (max-width: 600px){ .feed{ column-count: 1; } }

  .card{
    break-inside: avoid;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    margin: 0 0 22px;
    box-shadow: var(--shadow);
    animation: rise .35s ease;
  }
  @keyframes rise{
    from{ opacity:0; transform: translateY(-8px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .card-text{
    font-size:15px; line-height:1.55; white-space:pre-wrap; margin:0 0 14px;
  }
  .card-meta{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px; padding-top:12px; border-top:1px solid var(--line);
  }
  .card-meta .who{
    display:flex; flex-direction:column; gap:2px; min-width:0;
  }
  .card-meta a{
    color: var(--accent-deep); text-decoration:none; font-weight:700; font-size:13px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .card-meta a:hover{ text-decoration:underline; }
  .card-meta .time{ font-size:12px; color: var(--ink-soft); }
  .card-meta .phone{ font-size:12px; color: var(--ink-soft); }
  .card-del{
    background: none; color: var(--danger); font-size:12px; font-weight:700;
    padding:6px 10px; border-radius:8px; flex-shrink:0;
  }
  .card-del:hover{ background: #FBEAE4; }

  .empty{
    text-align:center; color: var(--ink-soft); padding: 60px 20px; font-size:14px;
  }

  /* modal */
  .overlay{
    position:fixed; inset:0; background: rgba(44,39,33,0.35);
    display:none; align-items:flex-start; justify-content:center;
    padding: 8vh 16px; z-index:20; backdrop-filter: blur(2px);
  }
  .overlay.open{ display:flex; }
  .modal{
    background: var(--card); border-radius: 22px; width:100%; max-width:440px;
    padding: 28px; box-shadow: 0 20px 60px -12px rgba(0,0,0,0.25);
  }
  .modal h2{
    font-family:'Fraunces', serif; font-weight:600; font-size:24px; margin:0 0 4px;
  }
  .modal .sub{ color: var(--ink-soft); font-size:13px; margin:0 0 20px; }
  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-size:12px; font-weight:700; color: var(--ink-soft);
    margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em;
  }
  .field textarea, .field input{
    width:100%; border:1px solid var(--line); border-radius:12px;
    padding:11px 13px; font-family:'Manrope', sans-serif; font-size:14px;
    background: var(--bg); color: var(--ink); resize:vertical;
  }
  .field textarea:focus, .field input:focus{
    outline:2px solid var(--sage); outline-offset:1px;
  }
  .field .hint{ font-size:11px; color: var(--ink-soft); margin-top:5px; }
  .modal-actions{ display:flex; gap:10px; margin-top:6px; }
  .modal-actions button{ flex:1; padding:12px; border-radius:12px; font-weight:700; font-size:14px; }
  .modal-actions .cancel{ background: var(--bg-soft); color: var(--ink-soft); }
  .modal-actions .submit{ background: var(--sage); color:#fff; }
  .err{ color: var(--danger); font-size:12px; margin-top:8px; display:none; }

  .status-banner{
    max-width: 1180px; margin: 0 auto; padding: 0 20px 20px;
    text-align:center; font-size:13px; color: var(--accent-deep);
  }
</style>
</head>
<body>

<div class="bg-horizon"></div>

<header>
  <div class="eyebrow">Городская доска</div>
  <h1 id="cityTitle">Кувандык</h1>
  <div class="admin-pill" id="adminPill" style="display:none;">Режим модератора включён</div>
  <p>Объявления жителей города — свежее наверху</p>
  <div class="actions">
    <button class="btn-primary" id="openForm">+ Разместить объявление</button>
  </div>
</header>

<div class="status-banner" id="statusBanner"></div>

<main>
  <div class="feed" id="feed"></div>
  <div class="empty" id="emptyState" style="display:none;">Пока нет объявлений. Будьте первыми.</div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Новое объявление</h2>
    <p class="sub">Объявление будет видно 5 дней, затем исчезнет само</p>
    <div class="field">
      <label for="adText">Текст объявления</label>
      <textarea id="adText" rows="4" maxlength="600" placeholder="Что хотите продать, купить или сообщить?"></textarea>
    </div>
    <div class="field">
      <label for="adVk">Ссылка на профиль ВКонтакте</label>
      <input id="adVk" type="text" placeholder="vk.com/имя_профиля">
      <div class="hint">Так люди видят, что объявление настоящее</div>
    </div>
    <div class="field">
      <label for="adPhone">Телефон (необязательно)</label>
      <input id="adPhone" type="text" placeholder="+7 900 000-00-00">
    </div>
    <div class="err" id="formErr"></div>
    <div class="modal-actions">
      <button class="cancel" id="cancelForm">Отмена</button>
      <button class="submit" id="submitForm">Опубликовать</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, deleteDoc, doc,
    onSnapshot, query, orderBy, serverTimestamp, Timestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  /* ====================================================================
     НАСТРОЙКА FIREBASE — замените значения ниже на свои из консоли Firebase
     (Project settings → General → Your apps → SDK setup and configuration)
     ==================================================================== */
  const firebaseConfig = {
    apiKey: "AIzaSyAsuTZoZ4WvAVEkTNgiVU14B4r9Df6lXk0",
    authDomain: "kuvads.firebaseapp.com",
    projectId: "kuvads",
    storageBucket: "kuvads.firebasestorage.app",
    messagingSenderId: "706501748185",
    appId: "1:706501748185:web:20b3a2644220a1cb06e5c8"
  };

  // Простой пароль модератора. Смените на свой перед публикацией.
  const ADMIN_PASSWORD = "kuvandyk2026";

  const EXPIRY_DAYS = 5;
  const statusBanner = document.getElementById('statusBanner');

  let db;
  let firebaseReady = false;
  try {
    if (firebaseConfig.apiKey === "ВАШ_API_KEY") {
      throw new Error("not-configured");
    }
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    firebaseReady = true;
  } catch (e) {
    statusBanner.textContent = "Firebase ещё не подключён — впишите свои ключи в index.html, чтобы лента стала общей для всех.";
  }

  const feed = document.getElementById('feed');
  const emptyState = document.getElementById('emptyState');
  const overlay = document.getElementById('overlay');
  const openForm = document.getElementById('openForm');
  const cancelForm = document.getElementById('cancelForm');
  const submitForm = document.getElementById('submitForm');
  const formErr = document.getElementById('formErr');
  const cityTitle = document.getElementById('cityTitle');
  const adminPill = document.getElementById('adminPill');

  let adminMode = sessionStorage.getItem('kuvandyk_admin') === '1';
  updateAdminUI();

  function updateAdminUI(){
    adminPill.style.display = adminMode ? 'inline-block' : 'none';
  }

  function turnOffAdmin(){
    adminMode = false;
    sessionStorage.removeItem('kuvandyk_admin');
    updateAdminUI();
    render(currentAds);
  }
  adminPill.addEventListener('click', turnOffAdmin);

  // Скрытый вход в режим модератора: 5 быстрых кликов по названию города.
  // Обычные посетители об этом не знают — кнопки на странице нет.
  let titleClicks = [];
  cityTitle.addEventListener('click', () => {
    const now = Date.now();
    titleClicks.push(now);
    titleClicks = titleClicks.filter(t => now - t < 1800);
    if (titleClicks.length >= 5) {
      titleClicks = [];
      if (adminMode) return;
      const pass = prompt('Пароль модератора:');
      if (pass === ADMIN_PASSWORD) {
        adminMode = true;
        sessionStorage.setItem('kuvandyk_admin', '1');
        updateAdminUI();
        render(currentAds);
      } else if (pass !== null) {
        alert('Неверный пароль');
      }
    }
  });

  openForm.addEventListener('click', () => {
    formErr.style.display = 'none';
    document.getElementById('adText').value = '';
    document.getElementById('adVk').value = '';
    document.getElementById('adPhone').value = '';
    overlay.classList.add('open');
  });
  cancelForm.addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('open'); });

  submitForm.addEventListener('click', async () => {
    const text = document.getElementById('adText').value.trim();
    const vk = document.getElementById('adVk').value.trim();
    const phone = document.getElementById('adPhone').value.trim();

    if (!text) { showErr('Напишите текст объявления'); return; }
    if (!vk || !/vk\.com\//i.test(vk)) { showErr('Укажите корректную ссылку на ВК (vk.com/...)'); return; }
    if (!firebaseReady) { showErr('Firebase не настроен — объявление не будет видно другим'); return; }

    submitForm.disabled = true;
    submitForm.textContent = 'Публикуем…';
    try {
      await addDoc(collection(db, 'ads'), {
        text, vk, phone,
        createdAt: serverTimestamp()
      });
      overlay.classList.remove('open');
    } catch (e) {
      showErr('Не получилось опубликовать. Попробуйте ещё раз.');
    }
    submitForm.disabled = false;
    submitForm.textContent = 'Опубликовать';
  });

  function showErr(msg){
    formErr.textContent = msg;
    formErr.style.display = 'block';
  }

  function normalizeVk(vk){
    if (!/^https?:\/\//i.test(vk)) return 'https://' + vk;
    return vk;
  }

  function timeAgo(date){
    const diffMs = Date.now() - date.getTime();
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return 'только что';
    if (mins < 60) return mins + ' мин назад';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + ' ч назад';
    const days = Math.floor(hrs / 24);
    return days + ' дн назад';
  }

  let currentAds = [];

  function render(ads){
    currentAds = ads;
    const cutoff = Date.now() - EXPIRY_DAYS * 24 * 60 * 60 * 1000;
    const visible = ads.filter(a => a.createdAtMs && a.createdAtMs > cutoff);

    feed.innerHTML = '';
    emptyState.style.display = visible.length ? 'none' : 'block';

    visible.forEach(ad => {
      const card = document.createElement('div');
      card.className = 'card';

      const p = document.createElement('p');
      p.className = 'card-text';
      p.textContent = ad.text;
      card.appendChild(p);

      const meta = document.createElement('div');
      meta.className = 'card-meta';

      const who = document.createElement('div');
      who.className = 'who';
      const a = document.createElement('a');
      a.href = normalizeVk(ad.vk);
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.textContent = 'ВКонтакте →';
      who.appendChild(a);
      const time = document.createElement('div');
      time.className = 'time';
      time.textContent = ad.createdAtMs ? timeAgo(new Date(ad.createdAtMs)) : '';
      who.appendChild(time);
      if (ad.phone) {
        const ph = document.createElement('div');
        ph.className = 'phone';
        ph.textContent = ad.phone;
        who.appendChild(ph);
      }
      meta.appendChild(who);

      if (adminMode) {
        const del = document.createElement('button');
        del.className = 'card-del';
        del.textContent = 'Удалить';
        del.addEventListener('click', async () => {
          if (!confirm('Удалить это объявление?')) return;
          try { await deleteDoc(doc(db, 'ads', ad.id)); }
          catch(e) { alert('Не удалось удалить'); }
        });
        meta.appendChild(del);
      }

      card.appendChild(meta);
      feed.appendChild(card);
    });
  }

  if (firebaseReady) {
    const q = query(collection(db, 'ads'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snap) => {
      const ads = snap.docs.map(d => {
        const data = d.data();
        return {
          id: d.id,
          text: data.text,
          vk: data.vk,
          phone: data.phone,
          createdAtMs: data.createdAt instanceof Timestamp ? data.createdAt.toMillis() : Date.now()
        };
      });
      render(ads);
    }, (err) => {
      statusBanner.textContent = 'Не удалось подключиться к базе. Проверьте настройки Firebase и правила доступа.';
    });
  } else {
    render([]);
  }
</script>

</body>
</html>
